<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    background: #FDF6EE;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(107,63,141,0.04) 0%, transparent 60%);
  }
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 80px;
  }
  .logo {
    font-size: 28px;
    font-weight: 600;
    color: #6B3F8D;
    letter-spacing: 1px;
    margin-bottom: 60px;
  }
  .closing-line {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 52px;
    font-weight: 600;
    color: #2C2C2C;
    line-height: 1.3;
    margin-bottom: 60px;
    font-style: italic;
  }
  .cta-button {
    display: inline-block;
    background: #6B3F8D;
    color: #fff;
    font-size: 34px;
    font-weight: 700;
    padding: 28px 64px;
    border-radius: 16px;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
  }
  .cta-sub {
    font-size: 24px;
    color: rgba(44,44,44,0.5);
    margin-top: 16px;
  }
  .url {
    margin-top: 60px;
    font-size: 28px;
    font-weight: 500;
    color: #7C9A82;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo">MenoMind</div>
    <div class="closing-line">"Understanding what's happening<br>is the first step to feeling like<br>yourself again."</div>
    <div class="cta-button">Take the Free Symptom Check</div>
    <div class="cta-sub">2 minutes. No account required. 100% private.</div>
    <div class="url">menomind.app/quiz</div>
  </div>
</body>
</html>
