        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            color: #1A1A2E;
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            padding: 14px 20px;
            background: #FFFBF5;
            border-bottom: 1px solid rgba(107, 63, 141, 0.08);
            text-align: center;
        }
        .header a {
            font-size: 20px;
            font-weight: 700;
            color: #6B3F8D;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* ── Phase 1: Results ── */
        .results-phase {
            padding-top: 32px;
        }
        .results-eyebrow {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6B3F8D;
            margin-bottom: 8px;
        }
        .results-headline {
            text-align: center;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 800;
            color: #1A1A2E;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            line-height: 1.2;
        }
        .results-subhead {
            text-align: center;
            font-size: 15px;
            color: #777;
            margin-bottom: 28px;
        }

        /* Indicator pill */
        .indicator-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .indicator-pill .pulse {
            width: 10px; height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }
        .indicator-pill .label {
            font-weight: 700;
            font-size: 15px;
        }

        /* Symptom connection cards */
        .connection-card {
            background: white;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 14px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
            border-left: 4px solid #6B3F8D;
        }
        .connection-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 6px;
        }
        .connection-card p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }
        .connection-card .tag {
            display: inline-block;
            background: #F0E6F6;
            color: #6B3F8D;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* ── Transition to AI ── */
        .ai-transition {
            text-align: center;
            padding: 36px 0 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }
        .ai-transition.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .ai-transition .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #6B3F8D, #D65C8C);
            margin: 0 auto 20px;
            border-radius: 2px;
        }
        .ai-transition p {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }

        /* ── Phase 2: AI Chat ── */
        .chat-phase {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }
        .chat-phase.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(107, 63, 141, 0.1);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #6B3F8D, #8B5FB5);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-avatar {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .chat-header-text h4 {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        .chat-header-text span {
            color: rgba(255,255,255,0.7);
            font-size: 11px;

        .chat-messages {

            min-height: 120px;
            max-height: 400px;
            overflow-y: auto;
        }

            max-width: 88%;
            padding: 14px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            animation: fadeInUp 0.5s ease;
        }

            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .bubble-ai {
            background: #F4F0F8;
            color: #1A1A2E;
            border-bottom-left-radius: 6px;
        }
        .bubble-user {
            background: linear-gradient(135deg, #6B3F8D, #8B5FB5);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 6px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            max-width: 70px;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: #C4B0D6;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }

            border-top: 1px solid #F0ECF4;
            padding: 14px 16px;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            border: 1px solid #E8E0F0;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: #FAFAFA;
        }
        .chat-input:focus {
            border-color: #6B3F8D;
            background: white;
        }
        .chat-input::placeholder { color: #BBB; }
        .chat-send {
            width: 40px; height: 40px;
            border: none;
            background: linear-gradient(135deg, #6B3F8D, #D65C8C);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .chat-send:hover { transform: scale(1.05); }
        .chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .chat-send svg { width: 18px; height: 18px; }

        /* ── Email Capture Overlay ── */
        .email-gate {
            display: none;
            padding: 20px;
            text-align: center;
        }
        .email-gate.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        .email-gate-card {
            background: linear-gradient(135deg, #F8F4FC, #FFF5F8);
            border-radius: 16px;
            padding: 28px 24px;
            border: 1px solid rgba(107, 63, 141, 0.1);
        }
        .email-gate h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A2E;
            margin-bottom: 6px;
        }
        .email-gate p {
            font-size: 13px;
            color: #777;
            margin-bottom: 16px;
        }
        .email-form {
            display: flex;
            gap: 8px;
        }
        .email-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #E0D6EC;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .email-input:focus { border-color: #6B3F8D; }
        .email-submit {
            padding: 12px 20px;
            background: linear-gradient(135deg, #6B3F8D, #D65C8C);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .email-submit:disabled { opacity: 0.6; }
        .email-skip {
            display: inline-block;
            margin-top: 12px;
            font-size: 12px;
            color: #AAA;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .email-skip:hover { color: #888; }
        .email-success {
            display: none;
            padding: 16px;
            text-align: center;
        }
        .email-success.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }
        .email-success p {
            font-size: 14px;
            color: #4A7C6F;
            font-weight: 500;
        }

        /* ── Bottom CTA ── */
        .bottom-cta {
            text-align: center;
            padding: 32px 0 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }
        .bottom-cta.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .cta-button {
            display: inline-block;
            padding: 16px 36px;
            background: linear-gradient(135deg, #6B3F8D, #D65C8C);
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(107, 63, 141, 0.3);
        }
        .cta-sub {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #AAA;
        }

        .disclaimer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-state h1 { font-size: 22px; margin-bottom: 10px; }
        .error-state p { color: #666; margin-bottom: 24px; font-size: 15px; }
    </style>

                // Bottom CTA — both pricing options
                '<div class="bottom-cta" id="bottomCta">' +
                    '<p style="font-size:13px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;">Ready for your full plan?</p>' +
                    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;">' +
                        '<a href="https://buy.stripe.com/9B68wOawV5Kb1B42771kA01" class="cta-button" style="font-size:15px;padding:14px 28px;" onclick="gtag(\'event\',\'begin_checkout\',{value:99,currency:\'USD\',items:[{item_name:\'MenoMind Annual\'}]});gtag(\'event\',\'conversion\',{send_to:\'AW-17830146300/5acJCJviioccEPzhibZC\',value:99,currency:\'USD\'});">Get Your Full Wellness Plan — $99/yr</a>' +
                        '<a href="https://buy.stripe.com/9B6bJ0cF31tV5Rk2771kA00" style="display:inline-block;padding:14px 28px;border:2px solid #6B3F8D;color:#6B3F8D;font-size:15px;font-weight:600;border-radius:50px;text-decoration:none;transition:all 0.2s;" onclick="gtag(\'event\',\'begin_checkout\',{value:14.99,currency:\'USD\',items:[{item_name:\'MenoMind Monthly\'}]});gtag(\'event\',\'conversion\',{send_to:\'AW-17830146300/5acJCJviioccEPzhibZC\',value:14.99,currency:\'USD\'});">Or $14.99/mo</a>' +
                    '</div>' +
                    '<span class="cta-sub">Try for $1 your first week \u2022 14-day refund guarantee \u2022 Cancel anytime</span>' +
                '</div>' +

                '<div class="disclaimer">' +
                    'This screening is for educational purposes only and is not a medical diagnosis.<br>' +
                    'Always consult with a qualified healthcare provider.' +
                '</div>';

            // Track results view
            gtag('event', 'quiz_results_view', { level: level, score: totalScore, symptoms: symptomNames.join(',') });
            if (typeof fbq === 'function') fbq('trackCustom', 'QuizResults', { level: level, score: totalScore });

            // Animate in the AI chat after a delay
            setTimeout(function() {
                document.getElementById('aiTransition').classList.add('visible');
            }, 800);

            setTimeout(function() {
                document.getElementById('chatPhase').classList.add('visible');
                // Show typing indicator then first message
                showTyping(function() {
                    var firstMsg = buildFirstAIMessage(data);
                    addBubble('ai', firstMsg);
                    chatMessages.push({ role: 'assistant', content: firstMsg });
                    gtag('event', 'ai_first_message_shown', { level: level });
                });
            }, 1600);
        }

        // ── Chat functions ──
        function showTyping(callback) {
            var messagesEl = document.getElementById('chatMessages');
            var typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.innerHTML = '<span></span><span></span><span></span>';
            messagesEl.appendChild(typingEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            var delay = 1200 + Math.random() * 800;
            setTimeout(function() {
                typingEl.remove();
                if (callback) callback();
            }, delay);
        }

        function addBubble(type, text) {
            var messagesEl = document.getElementById('chatMessages');
            var bubble = document.createElement('div');
            bubble.className = 'chat-bubble bubble-' + (type === 'ai' ? 'ai' : 'user');
            // Convert newlines to <br> for AI messages
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            messagesEl.appendChild(bubble);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sendMessage() {
            var input = document.getElementById('chatInput');
            var msg = input.value.trim();
            if (!msg) return;

            messageCount++;
            input.value = '';
            addBubble('user', msg);
            chatMessages.push({ role: 'user', content: msg });

            gtag('event', 'chat_message_sent', { message_number: messageCount });

            // After 2nd user message, show email gate (gate harder)
            if (!emailCaptured && messageCount === 2) {
                document.getElementById('chatInputArea').style.display = 'none';
                document.getElementById('emailGate').classList.add('active');
                gtag('event', 'email_gate_shown');
                return;
            }

            // Otherwise, call AI
            callAI();
        }

        function callAI() {
            var sendBtn = document.getElementById('chatSendBtn');
            var input = document.getElementById('chatInput');
            sendBtn.disabled = true;
            input.disabled = true;

            var symptoms = [];
            if (quizData.a.cognitive > 0) symptoms.push('Cognitive & Mood');
            if (quizData.a.vasomotor > 0) symptoms.push('Vasomotor');
            if (quizData.a.somatic > 0) symptoms.push('Somatic');
            if (quizData.a.cycle > 0) symptoms.push('Cycle Changes');

            var level = quizData.s <= 3 ? 'low' : quizData.s <= 7 ? 'moderate' : 'strong';

            showTyping(function() {
                fetch(EDGE_FN_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        messages: chatMessages,
                        quizSymptoms: symptoms,
                        quizLevel: level
                    })
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.response) {
                        addBubble('ai', data.response);
                        chatMessages.push({ role: 'assistant', content: data.response });
                    } else {
                        addBubble('ai', 'I\u2019m here with you. Tell me more about what you\u2019ve been experiencing.');
                    }
                    sendBtn.disabled = false;
                    input.disabled = false;
                    input.focus();

                    var aiCount = chatMessages.filter(function(m) { return m.role === 'assistant'; }).length;

                    // After 4th AI response, show upgrade nudge inline
                    if (aiCount === 4 && !window._upgradeShown) {
                        window._upgradeShown = true;
                        setTimeout(function() {
                            addBubble('ai', 'I can see a real pattern forming here. You\u2019ve been sharing important details and I want to give you the full picture \u2014 your personalized symptom timeline, what to ask your doctor, and an action plan based on everything we\u2019ve discussed.\n\nThat\u2019s part of your full wellness plan. Try it for $1 your first week \u2014 if it doesn\u2019t feel right, cancel anytime.');
                            // Insert inline CTA button after the bubble
                            var messagesEl = document.getElementById('chatMessages');
                            var ctaDiv = document.createElement('div');
                            ctaDiv.style.cssText = 'text-align:center;margin:12px 0 16px;';
                            ctaDiv.innerHTML = '<a href="https://buy.stripe.com/9B68wOawV5Kb1B42771kA01" style="display:inline-block;padding:12px 24px;background:linear-gradient(135deg,#6B3F8D,#D65C8C);color:white;font-size:14px;font-weight:600;border-radius:50px;text-decoration:none;" onclick="gtag(\'event\',\'begin_checkout\',{value:99,currency:\'USD\',items:[{item_name:\'MenoMind Annual\'}]});gtag(\'event\',\'conversion\',{send_to:\'AW-17830146300/5acJCJviioccEPzhibZC\',value:99,currency:\'USD\'});">Get My Full Wellness Plan — $1 to start</a>';
                            messagesEl.appendChild(ctaDiv);
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            // Now show the bottom CTA too
                            document.getElementById('bottomCta').classList.add('visible');
                        }, 1500);
                    }
                })
                .catch(function() {
                    addBubble('ai', 'I want to keep talking with you about this. If you\u2019re experiencing these symptoms, you deserve answers \u2014 and you\u2019re not imagining any of it.');
                    sendBtn.disabled = false;
                    input.disabled = false;
                });
            });
        }

        // ── Email functions ──
        function handleEmailSubmit(e) {
            e.preventDefault();
            var email = document.getElementById('emailInput').value.trim();
            if (!email) return;

            var btn = document.getElementById('emailBtn');
            btn.disabled = true;
            btn.textContent = 'Saving\u2026';

            var symptoms = [];
            if (quizData.a.cognitive > 0) symptoms.push('Cognitive & Mood');
            if (quizData.a.vasomotor > 0) symptoms.push('Vasomotor');
            if (quizData.a.somatic > 0) symptoms.push('Somatic');
            if (quizData.a.cycle > 0) symptoms.push('Cycle Changes');
            var level = quizData.s <= 3 ? 'low' : quizData.s <= 7 ? 'moderate' : 'strong';

            // Save to Supabase
            fetch(SUPABASE_URL + '/rest/v1/email_leads', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    email: email,
                    source: 'results_chat',
                    quiz_score: quizData.s,
                    quiz_result: level
                })
            }).then(function() {
                completeEmailCapture();
            }).catch(function() {
                // Still continue even if save fails
                completeEmailCapture();
            });

            // Notify via email
            notifyEmail(email, 'results_chat', { quiz_score: quizData.s, quiz_result: level, symptoms: symptoms.join(', ') });

            // Track conversions
            gtag('event', 'generate_lead', { method: 'results_chat' });
            gtag('event', 'conversion', {
                'send_to': 'AW-17830146300/qbF8CJjiioccEPzhibZC',
                'value': 1.0,
                'currency': 'USD'
            });
            if (typeof fbq === 'function') fbq('track', 'Lead');
        }

        function completeEmailCapture() {
            emailCaptured = true;
            document.getElementById('emailGate').classList.remove('active');
            document.getElementById('emailGate').style.display = 'none';
            document.getElementById('emailSuccess').classList.add('active');

            setTimeout(function() {
                document.getElementById('emailSuccess').classList.remove('active');
                document.getElementById('emailSuccess').style.display = 'none';
                document.getElementById('chatInputArea').style.display = 'flex';
                document.getElementById('chatInput').focus();
                // Now call AI to respond to the message that triggered the email gate
                callAI();
            }, 1500);
        }

        function skipEmail() {
            emailCaptured = true; // Don't ask again
            document.getElementById('emailGate').classList.remove('active');
            document.getElementById('emailGate').style.display = 'none';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('chatInput').focus();
            gtag('event', 'email_gate_skipped');
            callAI();
        }

        // ── Error state ──
        function renderError() {
            document.getElementById('app').innerHTML =
                '<div class="error-state">' +
                    '<h1>Results not found</h1>' +
                    '<p>This link may have expired. Take the quiz to get your personalized results.</p>' +
                    '<a href="/#quiz" class="cta-button">Take the Quiz</a>' +
                '</div>';
        }

        // ── Init ──
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        if (token) {
            var data = decodeToken(token);
            if (data && data.a) {
                render(data);
            } else {
                renderError();
            }
        } else {
            renderError();
        }
    </script>
</body>
</html>
