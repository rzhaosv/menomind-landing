<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #1B2E1F;
    font-family: 'Playfair Display', Georgia, serif;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  /* Subtle texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.02) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.015) 0%, transparent 50%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 0 100px;
  }

  .statement {
    font-size: 72px;
    font-weight: 700;
    color: #F5F0E8;
    line-height: 1.25;
    letter-spacing: -0.5px;
  }

  .logo {
    position: absolute;
    bottom: 56px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="statement">Nobody told you perimenopause could start at 37.</div>
  </div>
  <div class="logo">MenoMind</div>
</body>
</html>
